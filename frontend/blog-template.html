<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{TITLE}} — lncurl.lol</title>
    <meta name="description" content="{{DESCRIPTION}}" />
    <link rel="canonical" href="https://lncurl.lol/blog/{{SLUG}}" />

    <!-- Open Graph -->
    <meta property="og:type" content="article" />
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta property="og:url" content="https://lncurl.lol/blog/{{SLUG}}" />
    <meta property="og:site_name" content="lncurl.lol" />
    <meta property="article:published_time" content="{{ISO_DATE}}" />
    {{OG_IMAGE_TAGS}}

    <!-- Twitter Card -->
    {{TWITTER_CARD_TAG}}
    <meta name="twitter:title" content="{{TITLE}}" />
    <meta name="twitter:description" content="{{DESCRIPTION}}" />
    {{TWITTER_IMAGE_TAG}}

    <!-- RSS feed -->
    <link
      rel="alternate"
      type="application/rss+xml"
      title="lncurl.lol Blog"
      href="/feed.xml"
    />
    <link rel="icon" type="image/png" href="/icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Vite-built CSS bundle -->
    <link rel="stylesheet" href="/{{CSS_FILE}}" />

    <!-- Inline critical CSS — prevents flash of unstyled content before bundle loads -->
    <style>
      :root {
        --background: oklch(0.13 0.01 250);
        --foreground: oklch(0.93 0 0);
        --card: oklch(0.17 0.01 250);
        --border: oklch(1 0 0 / 10%);
        --muted-foreground: oklch(0.6 0 0);
        --terminal: oklch(0.85 0.18 142);
        --terminal-dim: oklch(0.55 0.12 142);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        background: var(--background);
        color: var(--foreground);
      }
      body {
        background: var(--background);
        color: var(--foreground);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      a {
        color: var(--terminal);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .blog-nav {
        border-bottom: 1px solid var(--border);
        padding: 0.75rem 1rem;
      }
      .blog-nav-inner {
        max-width: 56rem;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.875rem;
      }
      .blog-nav-brand {
        font-size: 1.125rem;
        font-weight: 700;
      }
      .blog-nav-links {
        display: flex;
        gap: 1rem;
        color: var(--muted-foreground);
      }
      .blog-nav-links a {
        color: var(--muted-foreground);
      }
      .blog-nav-links a:hover {
        color: var(--foreground);
        text-decoration: none;
      }
      .blog-main {
        flex: 1;
        max-width: 56rem;
        margin: 0 auto;
        width: 100%;
        padding: 2rem 1rem;
      }
      .blog-footer {
        border-top: 1px solid var(--border);
        padding: 1.5rem 1rem;
        text-align: center;
        font-size: 0.875rem;
        color: var(--muted-foreground);
      }
    </style>
  </head>
  <body>
    <nav class="blog-nav">
      <div class="blog-nav-inner">
        <a href="/" class="blog-nav-brand">lncurl.lol</a>
        <div class="blog-nav-links">
          <a href="/">Home</a>
          <a href="/leaderboard">Leaderboard</a>
          <a href="/graveyard">Graveyard</a>
          <a href="/about">About</a>
          <a href="/blog">Blog</a>
        </div>
      </div>
    </nav>

    <main class="blog-main">
      {{HERO_IMAGE}}
      <article class="blog-content">
        <header class="blog-post-header">
          <h1>{{TITLE}}</h1>
          <div class="blog-post-meta">
            <time datetime="{{ISO_DATE}}">{{DISPLAY_DATE}}</time>
            {{TAGS_HTML}}
          </div>
        </header>
        {{CONTENT}}
      </article>
      <div class="blog-post-footer">
        <a href="/blog">← All posts</a>
      </div>
    </main>

    <footer class="blog-footer">
      Powered by
      <a
        href="https://getalby.com/alby-hub?ref=lncurl"
        target="_blank"
        rel="noopener noreferrer"
        >Alby Hub</a
      >
      +
      <a href="https://nwc.dev" target="_blank" rel="noopener noreferrer"
        >Nostr Wallet Connect</a
      >
    </footer>
  </body>
</html>
